<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Unavailable — Tessenya</title>

  <!-- Favicon (tab image) -->
  <link rel="icon" type="image/png" href="/attachments/tab-image.png">

  <!-- Google Font: Saira (Latin) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    /* GTK-inspired system theme variables */
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --on-surface: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.07);
      --radius: 28px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --surface: #2c2c2c;
        --on-surface: #f0f0f0;
        --muted: #a0a0a0;
        --border: #3a3a3a;
        --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Saira', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--on-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      padding: 1.5rem;
    }

    /* Elegant card with GTK feel */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3.5rem 3rem;
      box-shadow: var(--shadow);
      text-align: center;
      max-width: 540px;
      width: 100%;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
      animation: riseIn 0.7s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .brand-logo {
      width: 110px;
      height: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.08));
      transition: transform 0.2s;
    }

    .brand-logo:hover {
      transform: scale(1.03);
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--on-surface);
      opacity: 0.15;
      margin: 0 auto 1.5rem;
      border-radius: 3px;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 0.8rem;
      color: var(--on-surface);
      line-height: 1.3;
    }

    .description {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 2.2rem;
      line-height: 1.7;
      font-weight: 400;
    }

    .footer {
      font-size: 0.9rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
    }

    .footer a {
      color: var(--on-surface);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .footer a:hover {
      border-bottom-color: var(--on-surface);
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Brand Logo -->
    <img src="/attachments/brand.png" alt="Tessenya Logo" class="brand-logo">

    <!-- Divider for visual elegance -->
    <div class="divider"></div>

    <!-- Main Heading -->
    <h1>This site is currently unavailable.</h1>

    <!-- Subtext -->
    <p class="description">
      We are working on something great.<br>
      Please check back soon.
    </p>

    <!-- Footer with copyright and support email -->
    <div class="footer">
      © Tessenya Inc. &nbsp;|&nbsp;
      <a href="mailto:support@ivanova.sbs">support@ivanova.sbs</a>
    </div>
  </div>
</body>
</html>
