<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Unavailable</title>

  <!-- Favicon (tab image) -->
  <link rel="icon" type="image/png" href="/attachments/tab-image.png">

  <!-- Google Font: Saira -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    /* GTK-like system theme variables */
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --card-bg: #ffffff;
      --border: #cccccc;
      --shadow: rgba(0, 0, 0, 0.08);
      --muted: #555555;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #242424;
        --fg: #eeeeee;
        --card-bg: #2d2d2d;
        --border: #444444;
        --shadow: rgba(0, 0, 0, 0.3);
        --muted: #aaaaaa;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Saira', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Main card (GTK dialog style) */
    .gtk-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 8px 32px var(--shadow);
      text-align: center;
      max-width: 520px;
      width: 90%;
      transition: background 0.3s, border-color 0.3s;
    }

    .brand-logo {
      width: 100px;
      height: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--fg);
    }

    .message {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      width: 100%;
      text-align: center;
    }

    .footer a {
      color: var(--fg);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }

    .footer a:hover {
      border-bottom-color: var(--fg);
    }

    /* Subtle entrance animation */
    .gtk-card {
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="gtk-card">
    <!-- Brand image centered -->
    <img src="/attachments/brand.png" alt="Brand Logo" class="brand-logo">

    <!-- Arabic message as requested -->
    <h1>هذا الموقع غير متاح حالياً.</h1>
    <p class="message">يرجى العودة لاحقًا، نحن نعمل على تحسين التجربة.</p>

    <!-- Footer inside the card -->
    <div class="footer">
      © Tessenya Inc. &nbsp;|&nbsp; 
      <a href="mailto:support@ivanova.sbs">support@ivanova.sbs</a>
    </div>
  </div>
</body>
</html>
