<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tessenya</title>

<!-- Tab icon -->
<link rel="icon" type="image/png" href="/attachments/tab-image.png">

<!-- Saira Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg:#F6F3EE;
    --surface:#FFFFFF;

    --text:#1B1B1B;
    --muted:#707070;

    --border:#E6E1D8;

    --radius:40px;

}

@media(prefers-color-scheme:dark){

:root{

    --bg:#141414;
    --surface:#1C1C1C;

    --text:#F4F4F4;
    --muted:#9A9A9A;

    --border:#2B2B2B;

}

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

    font-family:'Saira',sans-serif;

    background:var(--bg);

    color:var(--text);

    min-height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:32px;

    overflow:hidden;

}

/* soft ambient light */

body::before{

    content:"";

    position:fixed;

    width:900px;
    height:900px;

    right:-300px;
    top:-300px;

    background:
    radial-gradient(circle,
    rgba(210,180,140,.18),
    transparent 70%);

    pointer-events:none;

}

.card{

    width:min(760px,100%);

    background:var(--surface);

    border:1px solid var(--border);

    border-radius:var(--radius);

    padding:85px 70px;

    text-align:center;

    animation:appear .8s ease;

}

@keyframes appear{

from{

    opacity:0;

    transform:translateY(25px);

}

to{

    opacity:1;

    transform:none;

}

}

/* logo */

.logo{

    width:min(320px,80vw);

    height:auto;

    margin-bottom:60px;

    user-select:none;

    pointer-events:none;

    animation:float 8s ease-in-out infinite;

    filter:
    drop-shadow(0 15px 40px rgba(0,0,0,.08));

}

@media(prefers-color-scheme:dark){

.logo{

    filter:
    drop-shadow(0 15px 50px rgba(255,255,255,.05));

}

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-8px);

}

}

/* title */

h1{

    font-size:clamp(2.8rem,5vw,4.4rem);

    line-height:1.12;

    font-weight:600;

    letter-spacing:-2px;

    margin-bottom:28px;

}

/* paragraph */

.description{

    max-width:560px;

    margin:auto;

    color:var(--muted);

    line-height:1.9;

    font-size:1.15rem;

}

/* footer */

.footer{

    margin-top:70px;

    padding-top:32px;

    border-top:1px solid var(--border);

    color:var(--muted);

    font-size:.95rem;

}

.footer a{

    text-decoration:none;

    color:inherit;

    transition:.25s;

}

.footer a:hover{

    opacity:.7;

}

</style>

</head>

<body>

<div class="card">

    <!-- Brand -->
    <img
    src="/attachments/brand.png"
    alt="Tessenya"
    class="logo">

    <!-- Title -->
    <h1>
        Something remarkable<br>
        is being built.
    </h1>

    <!-- Description -->
    <p class="description">

        Tessenya is currently unavailable while we prepare the next generation of AI experiences.

        Please check back soon.

    </p>

    <!-- Footer -->
    <div class="footer">

        © 2026 Tessenya Inc.

        &nbsp;&nbsp;·&nbsp;&nbsp;

        <a href="mailto:support@ivanova.sbs">
            support@ivanova.sbs
        </a>

    </div>

</div>

</body>
</html>
