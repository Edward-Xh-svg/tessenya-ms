<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tessenya</title>

<!-- Tab icon -->
<link rel="icon" type="image/png" href="/attachments/tab-image.png">

<!-- Saira font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

    --bg:#F6F3EE;
    --surface:#FFFFFF;

    --text:#1C1C1C;
    --muted:#666666;

    --border:#E7E2DB;

    --radius:36px;

}

@media (prefers-color-scheme:dark){

:root{

    --bg:#141414;

    --surface:#1B1B1B;

    --text:#F7F7F7;

    --muted:#9D9D9D;

    --border:#2A2A2A;

}

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Saira',sans-serif;

background:var(--bg);

color:var(--text);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

overflow:hidden;

}

body::before{

content:"";

position:fixed;

width:700px;

height:700px;

background:radial-gradient(circle,
rgba(210,185,150,.18),
transparent 70%);

top:-250px;
right:-250px;

pointer-events:none;

}

.card{

width:min(720px,100%);

background:var(--surface);

border:1px solid var(--border);

border-radius:var(--radius);

padding:80px;

text-align:center;

animation:fadeIn .9s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:none;

}

}

.logo{

width:120px;

margin-bottom:42px;

user-select:none;

}

.badge{

display:inline-flex;

align-items:center;

gap:10px;

padding:12px 20px;

border-radius:999px;

background:rgba(0,0,0,.04);

font-size:.95rem;

margin-bottom:36px;

}

@media(prefers-color-scheme:dark){

.badge{

background:rgba(255,255,255,.05);

}

}

.dot{

width:8px;

height:8px;

border-radius:50%;

background:#D5A25B;

}

h1{

font-size:clamp(2.5rem,5vw,4rem);

font-weight:600;

line-height:1.15;

letter-spacing:-1.5px;

margin-bottom:25px;

}

.description{

font-size:1.15rem;

line-height:1.9;

color:var(--muted);

max-width:520px;

margin:auto;

}

.footer{

margin-top:60px;

padding-top:30px;

border-top:1px solid var(--border);

font-size:.95rem;

color:var(--muted);

}

.footer a{

color:inherit;

text-decoration:none;

}

.footer a:hover{

opacity:.7;

}

</style>

</head>

<body>

<div class="card">

<img
src="/attachments/brand.png"
alt="Tessenya"
class="logo">

<div class="badge">

<div class="dot"></div>

Temporarily unavailable

</div>

<h1>
Something remarkable is being built.
</h1>

<p class="description">

Tessenya is currently unavailable while we prepare the next generation of AI experiences.

Please check back soon.

</p>

<div class="footer">

© 2026 Tessenya Inc.

&nbsp;&nbsp;·&nbsp;&nbsp;

<a href="mailto:support@ivanova.sbs">
support@ivanova.sbs
</a>

</div>

</div>

</body>
</html>
