<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tessenya</title>

<link rel="icon" type="image/png" href="/attachments/tab-image.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#f6f3ee;
    --surface:#ffffff;
    --text:#1b1b1b;
    --muted:#6f6f6f;
    --border:#e7e2db;
}

@media(prefers-color-scheme:dark){
:root{
    --bg:#131313;
    --surface:#1c1c1c;
    --text:#f4f4f4;
    --muted:#9d9d9d;
    --border:#2a2a2a;
}
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
    font-family:'Saira',sans-serif;
    background:var(--bg);
    color:var(--text);

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    padding:30px;
}

#particles{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.card{

    width:min(760px,100%);

    background:rgba(255,255,255,.75);

    border:1px solid var(--border);

    border-radius:42px;

    backdrop-filter:blur(30px);

    text-align:center;

    padding:90px 70px;

    animation:appear .8s ease;

}

@media(prefers-color-scheme:dark){

.card{

    background:rgba(28,28,28,.7);

}

}

@keyframes appear{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:none;
}

}

.logo{

    width:min(320px,80vw);

    margin-bottom:55px;

    animation:float 8s ease-in-out infinite;

    user-select:none;

}

@keyframes float{

50%{

transform:translateY(-10px);

}

}

h1{

    font-size:clamp(2.7rem,5vw,4.3rem);

    line-height:1.12;

    font-weight:600;

    letter-spacing:-2px;

    margin-bottom:24px;

}

.description{

    max-width:560px;

    margin:auto;

    color:var(--muted);

    line-height:1.9;

    font-size:1.1rem;

}

.footer{

    margin-top:65px;

    padding-top:30px;

    border-top:1px solid var(--border);

    color:var(--muted);

    font-size:.95rem;

}

.footer a{

    color:inherit;

    text-decoration:none;

}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="card">

<img src="/attachments/brand.png"
class="logo"
alt="Tessenya">

<h1>
Something remarkable<br>
is being built.
</h1>

<p class="description">

Tessenya is currently unavailable while we prepare the next generation of AI experiences.

Please check back soon.

</p>

<div class="footer">

© 2026 Tessenya Inc.

&nbsp;&nbsp;·&nbsp;&nbsp;

<a href="mailto:support@ivanova.sbs">
support@ivanova.sbs
</a>

</div>

</div>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){

    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;

}

resize();

addEventListener("resize",resize);

const mouse = {

    x:w/2,
    y:h/2

};

addEventListener("mousemove",(e)=>{

    mouse.x=e.clientX;
    mouse.y=e.clientY;

});

const particles=[];

for(let i=0;i<180;i++){

    particles.push({

        x:Math.random()*w,

        y:Math.random()*h,

        vx:(Math.random()-.5)*0.3,

        vy:(Math.random()-.5)*0.3,

        size:Math.random()*2+1

    });

}

function draw(){

    ctx.clearRect(0,0,w,h);

    for(let i=0;i<particles.length;i++){

        let p=particles[i];

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0)p.x=w;
        if(p.x>w)p.x=0;

        if(p.y<0)p.y=h;
        if(p.y>h)p.y=0;

        let dx=mouse.x-p.x;
        let dy=mouse.y-p.y;

        let dist=Math.sqrt(dx*dx+dy*dy);

        if(dist<180){

            p.x-=dx*0.0018;
            p.y-=dy*0.0018;

        }

        ctx.beginPath();

        ctx.arc(

            p.x,
            p.y,
            p.size,

            0,
            Math.PI*2

        );

        ctx.fillStyle="rgba(160,160,160,.35)";

        ctx.fill();

        for(let j=i+1;j<particles.length;j++){

            let q=particles[j];

            let dx=q.x-p.x;
            let dy=q.y-p.y;

            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<100){

                ctx.beginPath();

                ctx.moveTo(p.x,p.y);

                ctx.lineTo(q.x,q.y);

                ctx.strokeStyle=`rgba(170,170,170,${0.12*(1-d/100)})`;

                ctx.stroke();

            }

        }

    }

    requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
